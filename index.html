<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculatrice</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --btn: #0f3460;
      --btn-h: #1a4a7a;
      --accent: #e94560;
      --accent2: #f5a623;
      --text: #e0e0ff;
      --text-dim: #8888aa;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0d1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
    }

    .calc-wrap {
      background: var(--bg);
      border-radius: 20px;
      padding: 1.25rem;
      width: 320px;
      border: 1px solid #2a2a4a;
      position: relative;
      overflow: hidden;
    }

    .calc-wrap::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, #e9456022 0%, transparent 70%);
      pointer-events: none;
    }

    .title {
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--text-dim);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 1rem;
    }

    .screen {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.25rem .75rem;
      margin-bottom: 1rem;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid #2a2a4a;
    }

    .expr {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      min-height: 18px;
      text-align: right;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .result {
      font-family: 'Share Tech Mono', monospace;
      font-size: 32px;
      color: var(--text);
      text-align: right;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: color .15s;
    }

    .result.err {
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 400;
      height: 60px;
      transition: all .1s;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity .1s;
    }

    button:active::after {
      opacity: .06;
    }

    button:active {
      transform: scale(0.96);
    }

    .btn-num {
      background: var(--btn);
      color: var(--text);
    }

    .btn-num:hover {
      background: var(--btn-h);
    }

    .btn-op {
      background: #1d1d3a;
      color: var(--accent2);
      font-size: 20px;
    }

    .btn-op:hover {
      background: #272748;
    }

    .btn-fn {
      background: #0d0d22;
      color: var(--text-dim);
      font-size: 13px;
    }

    .btn-fn:hover {
      background: #181830;
    }

    .btn-eq {
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      font-weight: 500;
    }

    .btn-eq:hover {
      background: #ff2a47;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calc-wrap">
  <div class="title">Calculatrice</div>
  <div class="screen">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="grid">
    <button class="btn-fn" onclick="ac()">AC</button>
    <button class="btn-fn" onclick="toggleSign()">+/−</button>
    <button class="btn-fn" onclick="percent()">%</button>
    <button class="btn-op" onclick="op('÷')">÷</button>

    <button class="btn-num" onclick="num('7')">7</button>
    <button class="btn-num" onclick="num('8')">8</button>
    <button class="btn-num" onclick="num('9')">9</button>
    <button class="btn-op" onclick="op('×')">×</button>

    <button class="btn-num" onclick="num('4')">4</button>
    <button class="btn-num" onclick="num('5')">5</button>
    <button class="btn-num" onclick="num('6')">6</button>
    <button class="btn-op" onclick="op('−')">−</button>

    <button class="btn-num" onclick="num('1')">1</button>
    <button class="btn-num" onclick="num('2')">2</button>
    <button class="btn-num" onclick="num('3')">3</button>
    <button class="btn-op" onclick="op('+')">+</button>

    <button class="btn-num btn-zero" onclick="num('0')">0</button>
    <button class="btn-num" onclick="dot()">.</button>
    <button class="btn-eq" onclick="calc()">=</button>
  </div>
</div>

<script>
  let cur = '0', prev = null, oper = null, fresh = false;
  const R = document.getElementById('result');
  const E = document.getElementById('expr');

  function disp() {
    R.textContent = fmt(cur);
    R.className = 'result';
  }

  function fmt(v) {
    let n = parseFloat(v);
    if (isNaN(n)) return v;
    if (Math.abs(n) > 1e12 || (!Number.isInteger(n) && v.length > 12))
      return n.toExponential(4);
    return v;
  }

  function num(d) {
    if (fresh) { cur = d; fresh = false; }
    else cur = cur === '0' && d !== '.' ? d : cur + d;
    disp();
  }

  function dot() {
    if (fresh) { cur = '0.'; fresh = false; disp(); return; }
    if (!cur.includes('.')) cur += '.';
    disp();
  }

  function op(o) {
    if (prev !== null && !fresh) {
      cur = String(compute());
      E.textContent = '';
      disp();
    }
    prev = cur; oper = o; fresh = true;
    E.textContent = prev + ' ' + o;
  }

  function compute() {
    let a = parseFloat(prev), b = parseFloat(cur);
    if (oper === '÷') { if (b === 0) { showErr('Erreur'); return 0; } return a / b; }
    if (oper === '×') return a * b;
    if (oper === '−') return a - b;
    if (oper === '+') return a + b;
    return b;
  }

  function calc() {
    if (prev === null || oper === null) return;
    let res = compute();
    E.textContent = prev + ' ' + oper + ' ' + cur + ' =';
    cur = String(parseFloat(res.toFixed(10)));
    prev = null; oper = null; fresh = true;
    disp();
  }

  function ac() {
    cur = '0'; prev = null; oper = null; fresh = false;
    E.textContent = '';
    disp();
  }

  function toggleSign() {
    cur = String(parseFloat(cur) * -1);
    disp();
  }

  function percent() {
    cur = String(parseFloat(cur) / 100);
    disp();
  }

  function showErr(m) {
    R.textContent = m;
    R.className = 'result err';
    setTimeout(() => { ac(); }, 1200);
  }

  // Support clavier
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') num(e.key);
    else if (e.key === '.') dot();
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('−');
    else if (e.key === '*') op('×');
    else if (e.key === '/') { e.preventDefault(); op('÷'); }
    else if (e.key === 'Enter' || e.key === '=') calc();
    else if (e.key === 'Backspace') {
      cur = cur.length > 1 ? cur.slice(0, -1) : '0';
      disp();
    }
    else if (e.key === 'Escape') ac();
    else if (e.key === '%') percent();
  });
</script>

</body>
</html>
